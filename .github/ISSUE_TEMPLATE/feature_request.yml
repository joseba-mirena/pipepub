name: ✨ Feature Request
description: Suggest an idea for PipePub
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - pipepub

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is
      placeholder: I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen
      placeholder: When I run `./tools/pipepub.sh publish` it should...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've thought about
      placeholder: I tried using X instead, but...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - High (blocking my workflow)
        - Medium (nice to have soon)
        - Low (interesting but not urgent)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or examples
      placeholder: Other platforms already have this feature...
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this feature request, you agree to follow our [Code of Conduct](https://github.com/pipepub/pipepub/blob/main/.github/CONTRIBUTING.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true