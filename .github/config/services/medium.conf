SERVICE_DISPLAY="Medium"
SERVICE_AUTH_TYPE="Bearer"
SERVICE_ENDPOINT="https://api.medium.com/v1/users/{{userId}}/posts"
SERVICE_HANDLER_FUNC="publish_to_medium"
SERVICE_MAX_TAGS=5
SERVICE_TAG_MIN_LENGTH=1
SERVICE_TAG_MAX_LENGTH=25
SERVICE_TAG_PATTERN="^[a-z0-9-]+$"
SERVICE_SUPPORTS_SUBTITLE=true
SERVICE_SUPPORTS_COVER_IMAGE=true
SERVICE_DEFAULT_STATUS="draft"
SERVICE_DEFAULT_AUTO="true"
SERVICE_DOC_URL="https://medium.com/me/settings"
SERVICE_REQUIRES_OAUTH="false"
SERVICE_FETCHES_USER_ID="true"