# tools/config/services.yaml - Service configurations
# This file is committed to git (no secrets)

services:
  devto:
    type: api_key
    fields:
      - name: token
        required: true
        description: "DEV.to API token"
        env_var: DEVTO_TOKEN
    requires_oauth: false

  hashnode:
    type: api_key
    fields:
      - name: token
        required: true
        description: "Hashnode Personal Access Token"
        env_var: HASHNODE_TOKEN
      - name: publication_id
        required: true
        description: "Hashnode Publication ID"
        env_var: HASHNODE_PUBLICATION_ID
    requires_oauth: false

  medium:
    type: oauth
    fields:
      - name: client_id
        required: true
        description: "Medium OAuth Client ID"
        env_var: MEDIUM_CLIENT_ID
      - name: client_secret
        required: true
        description: "Medium OAuth Client Secret"
        env_var: MEDIUM_CLIENT_SECRET
      - name: access_token
        required: false
        description: "Medium Access Token"
        env_var: MEDIUM_ACCESS_TOKEN
      - name: refresh_token
        required: false
        description: "Medium Refresh Token"
        env_var: MEDIUM_REFRESH_TOKEN
    auth_url: "https://medium.com/m/oauth/authorize"
    token_url: "https://api.medium.com/v1/tokens"
    scopes: "basicProfile,publishPost"
    requires_oauth: true
